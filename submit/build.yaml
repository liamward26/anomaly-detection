AWSTemplateFormatVersion: '2010-09-09'
Description: >
  DS5220 Data Project 1 - Event-driven anomaly detection stack (EC2 + EIP + S3 + SNS + IAM)

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the EC2 instance will be launched

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet for the EC2 instance

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 key pair for SSH access

  MyIpCidr:
    Type: String
    Description: Your public IP in CIDR notation for SSH, e.g. 1.2.3.4/32
    AllowedPattern: ^(?:\d{1,3}\.){3}\d{1,3}/32$

  BucketName:
    Type: String
    Description: Globally unique S3 bucket name
    AllowedPattern: ^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$

  RepoUrl:
    Type: String
    Description: HTTPS URL of your forked anomaly-detection repo
    Default: https://github.com/YOUR_USERNAME/anomaly-detection.git

  UbuntuAmiId:
    Type: String
    Description: Ubuntu 24.04 LTS AMI ID for your AWS region

Resources:
  AppBucket:
    Type: AWS::S3::Bucket
    DependsOn:
    - TopicPolicy
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      NotificationConfiguration:
        TopicConfigurations:
        - Event: s3:ObjectCreated:Put
          Topic: !Ref SnsTopic
          Filter:
            S3Key:
              Rules:
              - Name: prefix
                Value: raw/
              - Name: suffix
                Value: .csv

  SnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: ds5220-dp1

  TopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
      - !Ref SnsTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Sid: AllowS3PublishToTopic
          Effect: Allow
          Principal:
            Service: s3.amazonaws.com
          Action: sns:Publish
          Resource: !Ref SnsTopic
          Condition:
            ArnLike:
              aws:SourceArn: !Sub arn:aws:s3:::${BucketName}
            StringEquals:
              aws:SourceAccount: !Ref AWS::AccountId

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: ec2.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: SingleBucketAccess
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Sid: BucketListAccess
            Effect: Allow
            Action:
            - s3:ListBucket
            - s3:GetBucketLocation
            Resource: !Sub arn:aws:s3:::${BucketName}
          - Sid: BucketObjectAccess
            Effect: Allow
            Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
            Resource: !Sub arn:aws:s3:::${BucketName}/*

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
      - !Ref InstanceRole

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH from my IP and API access on port 8000
      VpcId: !Ref VpcId
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 22
        ToPort: 22
        CidrIp: !Ref MyIpCidr
      - IpProtocol: tcp
        FromPort: 8000
        ToPort: 8000
        CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
      - IpProtocol: -1
        CidrIp: 0.0.0.0/0

  AppInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref UbuntuAmiId
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
      - !Ref AppSecurityGroup
      BlockDeviceMappings:
      - DeviceName: /dev/sda1
        Ebs:
          VolumeSize: 16
          VolumeType: gp3
          DeleteOnTermination: true
      Tags:
      - Key: Name
        Value: ds5220-dp1-instance
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail

          export DEBIAN_FRONTEND=noninteractive
          export BUCKET_NAME='${BucketName}'

          apt-get update -y
          apt-get install -y python3 python3-pip python3-venv git curl

          echo "BUCKET_NAME=${BucketName}" >> /etc/environment

          mkdir -p /opt
          cd /opt

          rm -rf /opt/anomaly-detection
          git clone ${RepoUrl} /opt/anomaly-detection
          cd /opt/anomaly-detection

          python3 -m venv /opt/anomaly-detection/venv
          /opt/anomaly-detection/venv/bin/pip install --upgrade pip
          /opt/anomaly-detection/venv/bin/pip install -r /opt/anomaly-detection/requirements.txt

          mkdir -p /opt/anomaly-detection/logs
          chown -R ubuntu:ubuntu /opt/anomaly-detection

          cat > /etc/systemd/system/anomaly-api.service <<EOF
          [Unit]
          Description=DS5220 Anomaly Detection API
          After=network.target

          [Service]
          Type=simple
          User=ubuntu
          WorkingDirectory=/opt/anomaly-detection
          Environment=BUCKET_NAME=${BucketName}
          ExecStart=/opt/anomaly-detection/venv/bin/fastapi run app.py --host 0.0.0.0 --port 8000
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

          systemctl daemon-reload
          systemctl enable anomaly-api.service
          systemctl start anomaly-api.service

  ElasticIp:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  ElasticIpAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ElasticIp.AllocationId
      InstanceId: !Ref AppInstance

  HttpSubscription:
    Type: AWS::SNS::Subscription
    DependsOn:
    - ElasticIpAssociation
    - AppInstance
    Properties:
      TopicArn: !Ref SnsTopic
      Protocol: http
      Endpoint: !Sub http://${ElasticIp}:8000/notify

Outputs:
  InstanceId:
    Description: EC2 instance ID
    Value: !Ref AppInstance

  ElasticIP:
    Description: Public Elastic IP for the FastAPI service
    Value: !Ref ElasticIp

  BucketNameOutput:
    Description: S3 bucket name
    Value: !Ref BucketName

  TopicArn:
    Description: SNS topic ARN
    Value: !Ref SnsTopic

  HealthUrl:
    Description: FastAPI health endpoint
    Value: !Sub http://${ElasticIp}:8000/health

  NotifyUrl:
    Description: SNS notify endpoint
    Value: !Sub http://${ElasticIp}:8000/notify
